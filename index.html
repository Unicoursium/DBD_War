<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DBD War Simulator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <aside class="panel left-panel">
        <section class="card result-card">
          <h1>DBD War</h1>
          <button id="startBtn" type="button">开始模拟</button>
          <button id="restartBtn" type="button">重新模拟</button>
          <button id="resetBtn" type="button">重置</button>
          <div class="result">
            <span>结算</span>
            <strong id="resultText">等待开始</strong>
          </div>
        </section>

        <section class="card log-card">
          <h2>事件日志</h2>
          <ol id="eventLog"></ol>
        </section>

        <section class="card settings-card">
          <h2>左侧杀手</h2>
          <div id="leftSettings" class="setting-list"></div>
        </section>
      </aside>

      <section class="portrait-stage" aria-label="battle map">
        <canvas id="game" width="1440" height="1440"></canvas>
      </section>

      <aside class="panel right-panel">
        <section class="card settings-card">
          <h2>右侧杀手</h2>
          <div id="rightSettings" class="setting-list"></div>
        </section>
      </aside>
    </main>

    <script src="game.js"></script>
  </body>
</html>
